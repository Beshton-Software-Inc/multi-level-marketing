name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: winwinlaw_mlm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/winwinlaw_mlm_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      MLM_WEBHOOK_SECRET: ci-test-webhook-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check app loads (import smoke test)
        run: python -c "from app.main import app; print('app loaded ok')"

      - name: Check all routers import
        run: |
          python -c "
          from app.routers import auth, affiliate, admin, webhook
          from app.services.auth_service import hash_password, verify_password, generate_referral_code
          from app.services.mlm_service import calculate_and_create_commissions, get_team_members, preview_commission_breakdown
          print('all imports ok')
          "

      - name: Verify password hashing works
        run: |
          python -c "
          from app.services.auth_service import hash_password, verify_password
          h = hash_password('testpassword')
          assert verify_password('testpassword', h), 'verify failed'
          assert not verify_password('wrong', h), 'false positive'
          print('bcrypt ok')
          "

      - name: Check DB tables create
        run: |
          python -c "
          from app.database import engine, Base
          from app import models
          Base.metadata.create_all(bind=engine)
          print('tables created ok')
          "

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            pip install pytest pytest-asyncio httpx
            pytest tests/ -v
          else
            echo "No tests yet — skipping pytest"
          fi

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8001
